name: CI - Testes Automatizados

# Executa o pipeline sempre que houver push ou pull request
# para as branches principais, garantindo controle de qualidade contínuo.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    name: Rodar testes com PyTest
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Baixar código do repositório
        uses: actions/checkout@v4

      - name: Configurar Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes automatizados (PyTest)
        run: |
          pytest -v --cov=src --cov-report=term-missing

      - name: Verificar se a aplicação inicia corretamente (smoke test)
        run: |
          python -c "from src.app import app; print('App importado com sucesso:', app.name)"
