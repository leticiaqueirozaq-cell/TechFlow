<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="620" fill="white"/>

  <text x="450" y="30" font-size="20" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Diagrama de Casos de Uso — TechFlow Task Manager</text>

  <!-- System boundary -->
  <rect x="230" y="60" width="500" height="500" fill="#F5F9FF" stroke="#2E5C8A" stroke-width="2" rx="6"/>
  <text x="480" y="85" font-size="14" font-weight="bold" text-anchor="middle" fill="#2E5C8A">Sistema de Gerenciamento de Tarefas</text>

  <!-- Actor: Gestor de Projetos (left) -->
  <g stroke="#1a1a2e" stroke-width="2" fill="none">
    <circle cx="90" cy="230" r="14" fill="#EAF2FB"/>
    <line x1="90" y1="244" x2="90" y2="290"/>
    <line x1="60" y1="260" x2="120" y2="260"/>
    <line x1="90" y1="290" x2="65" y2="330"/>
    <line x1="90" y1="290" x2="115" y2="330"/>
  </g>
  <text x="90" y="350" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Gestor de</text>
  <text x="90" y="365" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Projetos</text>

  <!-- Actor: Membro da Equipe (left, lower) -->
  <g stroke="#1a1a2e" stroke-width="2" fill="none">
    <circle cx="90" cy="430" r="14" fill="#EAF2FB"/>
    <line x1="90" y1="444" x2="90" y2="490"/>
    <line x1="60" y1="460" x2="120" y2="460"/>
    <line x1="90" y1="490" x2="65" y2="530"/>
    <line x1="90" y1="490" x2="115" y2="530"/>
  </g>
  <text x="90" y="550" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Membro da</text>
  <text x="90" y="565" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">Equipe</text>

  <!-- Actor: Pipeline CI (right, automated actor) -->
  <g stroke="#1a1a2e" stroke-width="2" fill="none">
    <circle cx="810" cy="330" r="14" fill="#FCEFE0"/>
    <line x1="810" y1="344" x2="810" y2="390"/>
    <line x1="780" y1="360" x2="840" y2="360"/>
    <line x1="810" y1="390" x2="785" y2="430"/>
    <line x1="810" y1="390" x2="835" y2="430"/>
  </g>
  <text x="810" y="450" font-size="13" font-weight="bold" text-anchor="middle" fill="#1a1a2e">GitHub Actions</text>
  <text x="810" y="465" font-size="12" text-anchor="middle" fill="#555">(ator automatizado)</text>

  <!-- Use case ellipses -->
  <g>
    <ellipse cx="450" cy="120" rx="120" ry="30" fill="#DCEBFF" stroke="#2E5C8A" stroke-width="1.5"/>
    <text x="450" y="125" font-size="12.5" text-anchor="middle">Criar Tarefa</text>
  </g>
  <g>
    <ellipse cx="450" cy="190" rx="130" ry="30" fill="#DCEBFF" stroke="#2E5C8A" stroke-width="1.5"/>
    <text x="450" y="195" font-size="12.5" text-anchor="middle">Listar / Consultar Tarefas</text>
  </g>
  <g>
    <ellipse cx="450" cy="260" rx="140" ry="30" fill="#DCEBFF" stroke="#2E5C8A" stroke-width="1.5"/>
    <text x="450" y="265" font-size="12.5" text-anchor="middle">Atualizar Status da Tarefa</text>
  </g>
  <g>
    <ellipse cx="450" cy="330" rx="130" ry="30" fill="#DCEBFF" stroke="#2E5C8A" stroke-width="1.5"/>
    <text x="450" y="335" font-size="12.5" text-anchor="middle">Priorizar Tarefa Crítica</text>
  </g>
  <g>
    <ellipse cx="450" cy="400" rx="110" ry="30" fill="#DCEBFF" stroke="#2E5C8A" stroke-width="1.5"/>
    <text x="450" y="405" font-size="12.5" text-anchor="middle">Remover Tarefa</text>
  </g>
  <g>
    <ellipse cx="450" cy="470" rx="150" ry="30" fill="#DCEBFF" stroke="#2E5C8A" stroke-width="1.5"/>
    <text x="450" y="475" font-size="12.5" text-anchor="middle">Visualizar Resumo de Desempenho</text>
  </g>
  <g>
    <ellipse cx="450" cy="540" rx="150" ry="30" fill="#FCEFE0" stroke="#8A5A2E" stroke-width="1.5"/>
    <text x="450" y="545" font-size="12.5" text-anchor="middle">Executar Testes Automatizados</text>
  </g>

  <!-- Connections: Gestor de Projetos -->
  <g stroke="#1a1a2e" stroke-width="1.3">
    <line x1="104" y1="230" x2="330" y2="140"/>
    <line x1="104" y1="245" x2="320" y2="200"/>
    <line x1="104" y1="260" x2="310" y2="265"/>
    <line x1="104" y1="275" x2="320" y2="330"/>
    <line x1="104" y1="290" x2="340" y2="400"/>
    <line x1="104" y1="310" x2="300" y2="470"/>
  </g>

  <!-- Connections: Membro da Equipe -->
  <g stroke="#1a1a2e" stroke-width="1.3">
    <line x1="104" y1="410" x2="330" y2="200"/>
    <line x1="104" y1="425" x2="320" y2="265"/>
    <line x1="104" y1="440" x2="330" y2="330"/>
  </g>

  <!-- Connections: GitHub Actions -->
  <g stroke="#1a1a2e" stroke-width="1.3">
    <line x1="796" y1="330" x2="590" y2="540"/>
  </g>
  <text x="700" y="450" font-size="11" fill="#555">&lt;&lt;include&gt;&gt;</text>
  <line x1="580" y1="400" x2="600" y2="540" stroke="#888" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#888"/>
    </marker>
  </defs>
</svg>
